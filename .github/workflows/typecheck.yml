name: typecheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: typecheck only reads the repo. This is the fork-safe,
# GitHub-hosted path (no secrets, no self-hosted runner).
permissions:
  contents: read

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run typecheck
