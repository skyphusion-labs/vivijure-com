name: CI

# Typecheck on every push/PR; deploy to Cloudflare on main. vivijure-com is a
# PUBLIC repo, so per CI policy it runs on GitHub-hosted ubuntu-latest (fork-safe),
# NOT the self-hosted org fleet pool. wrangler deploy on main.
# vivijure-com is a thin static-asset worker -- no container builds.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    container: node:22-alpine
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Deploy (main only)
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
