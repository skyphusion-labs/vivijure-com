<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="90%">
      <stop offset="0%" stop-color="#0e1730"/>
      <stop offset="55%" stop-color="#070b14"/>
      <stop offset="100%" stop-color="#05080f"/>
    </radialGradient>
    <linearGradient id="viv" x1="0" y1="630" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#7c8cff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="mark" x1="14" y1="52" x2="50" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="mbg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#17243d"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#1e2d45" stroke-width="1" opacity="0.35"/>
    </pattern>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="90"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)" opacity="0.5"/>
  <circle cx="120" cy="40" r="230" fill="#1d4ed8" opacity="0.20" filter="url(#blur)"/>
  <circle cx="1120" cy="230" r="240" fill="#7c3aed" opacity="0.18" filter="url(#blur)"/>

  <!-- Right-side cinematic watermark: lens + play, echoing the logo mark -->
  <g transform="translate(980,150)" opacity="0.16">
    <circle cx="120" cy="120" r="118" fill="none" stroke="url(#viv)" stroke-width="10"/>
    <path d="M88 58L192 120L88 182Z" fill="url(#viv)"/>
  </g>

  <!-- Brand lockup: logo mark + wordmark -->
  <g transform="translate(80,72)">
    <g transform="scale(1.0)">
      <rect width="64" height="64" rx="13" fill="url(#mbg)"/>
      <circle cx="32" cy="32" r="18" fill="none" stroke="url(#mark)" stroke-width="3.5" opacity="0.9"/>
      <path d="M27 23L44 32L27 41Z" fill="url(#mark)"/>
    </g>
    <text x="82" y="44" font-family="JetBrains Mono" font-size="30" font-weight="700"
          letter-spacing="7" fill="url(#viv)">VIVIJURE</text>
  </g>

  <!-- Headline -->
  <text x="78" y="290" font-family="Instrument Serif" font-size="96" fill="#e8edf5">Make films with AI.</text>
  <text x="78" y="392" font-family="Instrument Serif" font-size="96" font-style="italic" fill="url(#viv)">On your own terms.</text>

  <!-- Tagline -->
  <text x="80" y="462" font-family="DM Sans 9pt" font-size="27" fill="#7b8da8">The self-hosted, AGPL-3.0 AI film studio. Your GPU, your keys, your artifacts.</text>

  <!-- Chips -->
  <g font-family="JetBrains Mono" font-size="18" font-weight="500">
    <g transform="translate(80,520)">
      <rect width="132" height="42" rx="8" fill="#0c1220" stroke="#2d4266"/>
      <text x="66" y="28" text-anchor="middle" fill="#22d3ee">AGPL-3.0</text>
    </g>
    <g transform="translate(228,520)">
      <rect width="150" height="42" rx="8" fill="#0c1220" stroke="#2d4266"/>
      <text x="75" y="28" text-anchor="middle" fill="#a78bfa">$0, not for sale</text>
    </g>
    <g transform="translate(394,520)">
      <rect width="212" height="42" rx="8" fill="#0c1220" stroke="#2d4266"/>
      <text x="106" y="28" text-anchor="middle" fill="#34d399">7 motion backends</text>
    </g>
    <g transform="translate(622,520)">
      <rect width="132" height="42" rx="8" fill="#0c1220" stroke="#2d4266"/>
      <text x="66" y="28" text-anchor="middle" fill="#fbbf24">no lock-in</text>
    </g>
  </g>

  <text x="1120" y="588" text-anchor="end" font-family="JetBrains Mono" font-size="20"
        letter-spacing="2" fill="#4a5d78">vivijure.com</text>
</svg>
